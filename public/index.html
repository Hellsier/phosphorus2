<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiRKNet Chat</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="authScreen">

        <div class="authWindow">

            <h1 class="bounce-text">
                <span>A</span><span>n</span><span>t</span><span>i</span><span>R</span><span>K</span><span>N</span><span>e</span><span>t</span>
            </h1>


            <p id="authTitle">
                Привет! Не рады вас видеть!!!
            </p>

            <input
                id="loginInput"
                type="text"
                placeholder="Логин"
            >

            <input
                id="nicknameInput"
                type="text"
                placeholder="Никнейм"
            >

            <input
                id="passwordInput"
                type="password"
                placeholder="Пароль"
            >

            <button id="authButton">
                Зарегистрироваться
            </button>

            <p id="switchMode">
                Уже есть аккаунт? Войти
            </p>

            <p id="authMessage"></p>

        </div>

    </div>

    <div id="chatContainer">

        <div class="sidebar">

            <div class="sidebarHeader">Чаты</div>

            <div id="contactsList">
                <div class="contactItem active" data-type="public" id="publicChatItem">
                    💬 Общий чат
                </div>
            </div>

            <div class="addContact">
                <input id="newContactLogin" type="text" placeholder="Логин пользователя">
                <button id="addContactBtn">+</button>
            </div>
            <p id="addContactMessage"></p>

        </div>

        <div class="chat">

            <div class="header" id="chatHeader">
                AntiRKNet — Общий чат
            </div>

            <div id="messages">

            </div>

            <div class="bottom">

                <input
                    id="messageInput"
                    type="text"
                    placeholder="Введите сообщение..."
                >

            <button id="sendButton">
                ➤
            </button>

    </div>

</div>

</div>

    <script src="script.js"></script>

</body>
</html>
