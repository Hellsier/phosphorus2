<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Phosphorus Chat</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="authScreen">

        <div class="authWindow">

            <h1 class="bounce-text">
                <span>P</span><span>H</span><span>O</span><span>S</span><span>P</span><span>H</span><span>O</span><span>R</span><span>U</span><span>S</span>
            </h1>


            <p id="authTitle">
                Привет! Не рады вас видеть!!!
            </p>

            <input
                id="loginInput"
                type="text"
                placeholder="Логин"
            >

            <input
                id="nicknameInput"
                type="text"
                placeholder="Никнейм"
            >

            <input
                id="passwordInput"
                type="password"
                placeholder="Пароль"
            >

            <button id="authButton">
                Зарегистрироваться
            </button>

            <p id="switchMode">
                Уже есть аккаунт? Войти
            </p>

            <p id="authMessage"></p>

        </div>

    </div>

    <div id="chatContainer">

        <div class="chat">

            <div class="header">
                Phosphorus
            </div>

            <div id="messages">

            </div>

            <div class="bottom">

                <input
                    id="messageInput"
                    type="text"
                    placeholder="Введите сообщение..."
                >

            <button id="sendButton">
                ➤
            </button>
<div class="chat">

    <div class="header">
        AntiRKNet
    </div>

    <div id="messages">

    </div>

    <div class="bottom">

        <input
            id="messageInput"
            type="text"
            placeholder="Введите сообщение..."
        >

        <button id="sendButton">
            ➤
        </button>

    </div>

</div>


</div>

    <script src="script.js"></script>

</body>
</html>
